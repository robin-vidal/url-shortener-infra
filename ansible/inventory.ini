[bastion]
bastion ansible_host={{ bastion_ip }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/url-shortener-key.pem

[backend]
backend ansible_host={{ backend_ip }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/url-shortener-key.pem ansible_ssh_common_args='-o ProxyJump=ec2-user@{{ bastion_ip }}'

[frontend]
frontend ansible_host={{ frontend_ip }} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/url-shortener-key.pem ansible_ssh_common_args='-o ProxyJump=ec2-user@{{ bastion_ip }}'
