- name: Install Docker on all hosts
  hosts: backend:frontend
  become: true
  tasks:
    - name: Install Docker
      yum:
        name:
          - docker
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

- name: Deploy backend
  hosts: backend
  become: true
  vars:
    ecr_url: "{{ ecr_backend_url }}"
    aws_region: us-east-1
  tasks:
    - name: Login to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin {{ ecr_url | regex_replace('/.*', '') }}

    - name: Pull backend image
      shell: docker pull {{ ecr_url }}:latest

    - name: Stop existing backend container
      shell: docker rm -f backend || true

    - name: Run backend container
      shell: >
        docker run -d --name backend
        --restart unless-stopped
        -p 8000:8000
        {{ ecr_url }}:latest

- name: Deploy frontend
  hosts: frontend
  become: true
  vars:
    ecr_url: "{{ ecr_frontend_url }}"
    aws_region: us-east-1
  tasks:
    - name: Login to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin {{ ecr_url | regex_replace('/.*', '') }}

    - name: Pull frontend image
      shell: docker pull {{ ecr_url }}:latest

    - name: Stop existing frontend container
      shell: docker rm -f frontend || true

    - name: Run frontend container
      shell: >
        docker run -d --name frontend
        --restart unless-stopped
        -p 80:80
        {{ ecr_url }}:latest
